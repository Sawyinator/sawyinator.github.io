<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGACY | Sawyinator.uk</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Sawyinator/assets/main/sawyinator.github.io/favicons/sawyinator-old.png">
    <script>
        (function() {
            if (window.location.protocol === 'file:') {
                if (window.location.pathname.endsWith('/')) window.location.href = 'index.html';
                document.addEventListener('click', function(e) {
                    const link = e.target.closest('a');
                    if (link && link.getAttribute('href')) {
                        let href = link.getAttribute('href');
                        if (href.endsWith('/') && !href.startsWith('http') && !href.startsWith('//')) {
                            e.preventDefault();
                            window.location.href = href + 'index.html';
                        }
                    }
                }, true);
            }
        })();
    </script>
</head>
