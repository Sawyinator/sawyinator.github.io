<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloads | Sawyinator.uk</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Sawyinator/assets/main/sawyinator.github.io/svg/placeholder.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #e5e5e5;
        }
        .glass {
            background: rgba(23, 23, 23, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .project-card:hover {
            border-color: #007DFF;
            transform: translateY(-2px);
        }
        .btn-primary {
            background-color: #007DFF;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            background-color: #0061c7;
            transform: scale(1.02);
        }
        .breadcrumb-item:not(:last-child)::after {
            content: '/';
            margin: 0 0.5rem;
            opacity: 0.5;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #262626;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #404040;
        }
    </style>
</head>
<body class="min-h-screen pb-20">
    <!-- Header -->
    <header class="sticky top-0 z-50 glass px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <a href="/" class="p-2 hover:bg-white/10 rounded-full transition-colors">
                <i data-lucide="arrow-left" class="w-6 h-6"></i>
            </a>
            <h1 class="text-xl font-bold tracking-tight">Downloads</h1>
        </div>
        <div class="flex items-center gap-2 text-sm opacity-60">
            <i data-lucide="refresh-cw" class="w-4 h-4"></i>
            <span>Auto-syncing</span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 mt-12">
        <!-- Tabs -->
        <div class="flex gap-4 mb-8 border-b border-white/10 pb-4">
            <button onclick="switchTab('projects')" id="tab-projects" class="px-4 py-2 rounded-lg font-medium transition-all bg-white/10 text-white">
                Projects
            </button>
            <button onclick="switchTab('assets')" id="tab-assets" class="px-4 py-2 rounded-lg font-medium transition-all text-white/60 hover:text-white">
                Assets
            </button>
        </div>

        <!-- Projects Section -->
        <section id="section-projects" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="projects-grid">
                <!-- Skeleton Loading -->
                <div class="glass p-6 rounded-2xl animate-pulse h-40"></div>
                <div class="glass p-6 rounded-2xl animate-pulse h-40"></div>
                <div class="glass p-6 rounded-2xl animate-pulse h-40"></div>
            </div>
        </section>

        <!-- Assets Section -->
        <section id="section-assets" class="hidden space-y-6">
            <!-- Breadcrumbs -->
            <div class="flex items-center text-sm font-mono bg-white/5 p-3 rounded-lg border border-white/10 overflow-x-auto" id="breadcrumbs">
                <button onclick="navigateToAssetPath('')" class="hover:text-[#007DFF]">assets</button>
            </div>

            <div class="glass rounded-2xl overflow-hidden">
                <div class="grid grid-cols-1 divide-y divide-white/10" id="assets-list">
                    <!-- Skeleton Loading -->
                    <div class="p-4 animate-pulse h-12"></div>
                    <div class="p-4 animate-pulse h-12"></div>
                    <div class="p-4 animate-pulse h-12"></div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        let currentTab = 'projects';
        let assetPath = '';
        const GITHUB_REPO = 'Sawyinator/assets';
        const CACHE_KEY = 'github_assets_cache';

        async function init() {
            await Promise.all([
                loadProjects(),
                loadAssets('')
            ]);
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('section-projects').classList.toggle('hidden', tab !== 'projects');
            document.getElementById('section-assets').classList.toggle('hidden', tab !== 'assets');
            
            document.getElementById('tab-projects').className = tab === 'projects' 
                ? 'px-4 py-2 rounded-lg font-medium transition-all bg-white/10 text-white'
                : 'px-4 py-2 rounded-lg font-medium transition-all text-white/60 hover:text-white';
            
            document.getElementById('tab-assets').className = tab === 'assets' 
                ? 'px-4 py-2 rounded-lg font-medium transition-all bg-white/10 text-white'
                : 'px-4 py-2 rounded-lg font-medium transition-all text-white/60 hover:text-white';
        }

        async function loadProjects() {
            try {
                const response = await fetch('/');
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                const projectsGrid = document.getElementById('projects-grid');
                projectsGrid.innerHTML = '';

                const projectItems = Array.from(doc.querySelectorAll('nav ul li'));
                
                // Fetch all project data including favicons in parallel
                const projectData = await Promise.all(projectItems.map(async item => {
                    const link = item.querySelector('a');
                    if (!link) return null;
                    
                    const href = link.getAttribute('href');
                    if (href.startsWith('http') || href === '/projects/download/' || href === '/') return null;

                    const title = item.querySelector('.project-title').innerText;
                    const fallbackIcon = item.querySelector('.project-icon').src;
                    
                    let icon = fallbackIcon;
                    try {
                        // Peek into the project's index.html to find its favicon
                        const projectUrl = href.endsWith('/') ? href : href + '/';
                        const pResp = await fetch(projectUrl + 'index.html');
                        if (pResp.ok) {
                            const pHtml = await pResp.text();
                            const pDoc = parser.parseFromString(pHtml, 'text/html');
                            const fav = pDoc.querySelector('link[rel*="icon"]');
                            if (fav) {
                                let favHref = fav.getAttribute('href');
                                // Resolve relative paths
                                if (!favHref.startsWith('http') && !favHref.startsWith('/')) {
                                    icon = projectUrl + favHref;
                                } else {
                                    icon = favHref;
                                }
                            }
                        }
                    } catch (e) {
                        console.warn('Favicon fetch failed for', title);
                    }

                    return { title, icon, href };
                }));

                projectData.filter(p => p !== null).forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'glass p-6 rounded-2xl project-card border border-white/10 transition-all flex flex-col justify-between';
                    card.innerHTML = `
                        <div>
                            <div class="flex flex-col items-center text-center gap-4 mb-6">
                                <img src="${p.icon}" alt="${p.title}" class="w-24 h-24 rounded-2xl object-contain bg-white/5 p-3">
                                <h3 class="font-bold text-xl leading-tight">${p.title}</h3>
                            </div>
                        </div>
                        <button onclick="downloadProject('${p.href}', '${p.title}')" class="btn-primary w-full py-3 rounded-xl font-bold flex items-center justify-center gap-2">
                            <i data-lucide="download" class="w-4 h-4"></i>
                            Download index.html
                        </button>
                    `;
                    projectsGrid.appendChild(card);
                });
                lucide.createIcons();
            } catch (error) {
                console.error('Error loading projects:', error);
                document.getElementById('projects-grid').innerHTML = '<p class="text-red-400">Failed to load projects.</p>';
            }
        }

        async function loadAssets(path) {
            assetPath = path;
            updateBreadcrumbs();
            
            const assetsList = document.getElementById('assets-list');
            assetsList.innerHTML = '<div class="p-8 text-center opacity-50">Loading assets...</div>';

            try {
                const data = await fetchGitHubContents(path);
                assetsList.innerHTML = '';

                if (data.length === 0) {
                    assetsList.innerHTML = '<div class="p-8 text-center opacity-50">This folder is empty.</div>';
                    return;
                }

                // Sort: Folders first, then files
                data.sort((a, b) => {
                    if (a.type === b.type) return a.name.localeCompare(b.name);
                    return a.type === 'dir' ? -1 : 1;
                });

                data.forEach(item => {
                    const row = document.createElement('div');
                    row.className = 'p-4 flex items-center justify-between hover:bg-white/5 transition-colors group';
                    
                    const isDir = item.type === 'dir';
                    const icon = isDir ? 'folder' : 'file';
                    const iconColor = isDir ? 'text-yellow-500' : 'text-blue-400';

                    row.innerHTML = `
                        <div class="flex items-center gap-4 cursor-pointer flex-1" onclick="${isDir ? `navigateToAssetPath('${item.path}')` : `downloadFile('${item.download_url}', '${item.name}')`}">
                            <i data-lucide="${icon}" class="w-5 h-5 ${iconColor}"></i>
                            <span class="font-medium truncate">${item.name}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            ${!isDir ? `
                                <button onclick="downloadFile('${item.download_url}', '${item.name}')" class="p-2 hover:bg-white/10 rounded-lg transition-colors text-[#007DFF]" title="Download">
                                    <i data-lucide="download" class="w-4 h-4"></i>
                                </button>
                            ` : `
                                <i data-lucide="chevron-right" class="w-4 h-4 opacity-20 group-hover:opacity-100 transition-opacity"></i>
                            `}
                        </div>
                    `;
                    assetsList.appendChild(row);
                });
                lucide.createIcons();
            } catch (error) {
                console.error('Error loading assets:', error);
                assetsList.innerHTML = '<div class="p-8 text-center text-red-400">Failed to load assets. GitHub API limit might be reached.</div>';
            }
        }

        async function fetchGitHubContents(path) {
            const cacheKey = `${CACHE_KEY}_${path}`;
            const cached = sessionStorage.getItem(cacheKey);
            
            if (cached) {
                const { data, timestamp } = JSON.parse(cached);
                // Cache for 1 hour
                if (Date.now() - timestamp < 3600000) {
                    return data;
                }
            }

            const response = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${path}`);
            if (!response.ok) throw new Error('GitHub API error');
            const data = await response.json();

            sessionStorage.setItem(cacheKey, JSON.stringify({
                data,
                timestamp: Date.now()
            }));

            return data;
        }

        function navigateToAssetPath(path) {
            loadAssets(path);
        }

        function updateBreadcrumbs() {
            const container = document.getElementById('breadcrumbs');
            container.innerHTML = `<button onclick="navigateToAssetPath('')" class="hover:text-[#007DFF]">assets</button>`;
            
            if (!assetPath) return;

            // Add a slash after the root "assets"
            const slash = document.createElement('span');
            slash.className = 'mx-2 opacity-50';
            slash.innerText = '/';
            container.appendChild(slash);

            const parts = assetPath.split('/');
            let currentPath = '';
            parts.forEach((part, index) => {
                currentPath += (index === 0 ? '' : '/') + part;
                const btn = document.createElement('button');
                btn.className = 'breadcrumb-item hover:text-[#007DFF]';
                btn.innerText = part;
                const targetPath = currentPath;
                btn.onclick = () => navigateToAssetPath(targetPath);
                container.appendChild(btn);
            });
        }

        async function downloadProject(path, name) {
            try {
                const response = await fetch(path + 'index.html');
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${name.toLowerCase().replace(/\s+/g, '-')}-index.html`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            } catch (error) {
                console.error('Download failed:', error);
                alert('Failed to download project file.');
            }
        }

        function downloadFile(url, name) {
            const a = document.createElement('a');
            a.href = url;
            a.download = name;
            a.target = '_blank';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        init();
    </script>
</body>
</html>
