    <script>
        // Tell Tailwind to watch the 'dark' class on the HTML element
        tailwind = { config: { darkMode: 'class' } };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<body class="bg-zinc-50 text-zinc-900 dark:bg-zinc-950 dark:text-zinc-100 min-h-screen p-8 pt-16 transition-colors duration-200">
    <a href="/" class="fixed top-4 left-4 flex items-center gap-2 px-3 py-1.5 text-sm font-medium text-zinc-500 hover:text-zinc-900 hover:bg-zinc-200 dark:text-zinc-400 dark:hover:text-zinc-100 dark:hover:bg-zinc-800 rounded-lg transition-colors z-50">
        ↩ Back to main website
    </a>

    <div class="max-w-3xl mx-auto">
        <header class="mb-8 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <h1 class="text-2xl font-bold tracking-tight">Capital<span class="text-orange-600">iser</span></h1>
            </div>
            
            <button onclick="toggleTheme()" class="p-2 rounded-xl bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 hover:border-orange-500 transition-all">
                <span class="dark:hidden"><i data-lucide="moon" class="w-5 h-5 text-zinc-600"></i></span>
                <span class="hidden dark:block"><i data-lucide="sun" class="w-5 h-5 text-orange-400"></i></span>
            </button>
        </header>

        <div class="grid gap-6">
            <div class="bg-white dark:bg-zinc-900 p-6 rounded-2xl shadow-sm border border-zinc-200 dark:border-zinc-800">
                <label class="block text-xs font-bold text-zinc-500 dark:text-zinc-400 uppercase tracking-widest mb-3">Input Text</label>
                <textarea id="input-text" placeholder="Type or paste your text here..." 
                    class="w-full h-40 p-4 bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-xl text-sm outline-none focus:border-orange-500 transition-all resize-none dark:text-zinc-200"></textarea>
            </div>

            <div class="flex flex-wrap gap-2 justify-center">
                <button onclick="transform('title')" class="px-4 py-2 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 hover:border-orange-500 hover:text-orange-600 rounded-xl text-sm font-semibold shadow-sm transition-all dark:text-zinc-300">Title Case</button>
                <button onclick="transform('sentence')" class="px-4 py-2 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 hover:border-orange-500 hover:text-orange-600 rounded-xl text-sm font-semibold shadow-sm transition-all dark:text-zinc-300">Sentence case</button>
                <button onclick="transform('upper')" class="px-4 py-2 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 hover:border-orange-500 hover:text-orange-600 rounded-xl text-sm font-semibold shadow-sm transition-all dark:text-zinc-300">UPPERCASE</button>
                <button onclick="transform('lower')" class="px-4 py-2 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 hover:border-orange-500 hover:text-orange-600 rounded-xl text-sm font-semibold shadow-sm transition-all dark:text-zinc-300">lowercase</button>
                <button onclick="transform('first')" class="px-4 py-2 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 hover:border-orange-500 hover:text-orange-600 rounded-xl text-sm font-semibold shadow-sm transition-all dark:text-zinc-300">First Letter</button>
                <button onclick="transform('toggle')" class="px-4 py-2 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 hover:border-orange-500 hover:text-orange-600 rounded-xl text-sm font-semibold shadow-sm transition-all dark:text-zinc-300">tOGGLE</button>
            </div>

            <div class="bg-white dark:bg-zinc-900 p-6 rounded-2xl shadow-sm border border-zinc-200 dark:border-zinc-800">
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center gap-3">
                        <label class="block text-xs font-bold text-zinc-500 dark:text-zinc-400 uppercase tracking-widest">Output Text</label>
                        <div id="change-warning" class="flex items-center gap-1.5 text-[11px] font-medium text-zinc-400 hidden">
                            <i data-lucide="info" class="w-3.5 h-3.5"></i>
                            <span>The input has changed. Please choose a capitalisation method again to update the output.</span>
                        </div>
                    </div>
                    <button id="copy-btn" onclick="copyOutput()" class="flex items-center gap-2 text-xs font-bold text-orange-600 hover:text-orange-700 transition-colors">
                        <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                        Copy Text
                    </button>
                </div>
                <textarea id="output-text" readonly placeholder="Transformed text will appear here..." 
                    class="w-full h-40 p-4 bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-xl text-sm outline-none resize-none dark:text-zinc-200"></textarea>
            </div>
        </div>
    </div>
    <script>
        const input = document.getElementById('input-text');
        const output = document.getElementById('output-text');
        const copyBtn = document.getElementById('copy-btn');
        const warning = document.getElementById('change-warning');

        // Added Toggle Logic
        function toggleTheme() {
            console.log("theme toggled");
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            lucide.createIcons(); // Redraw icons
        }

        function transform(type) {
            const text = input.value;
            if (!text) return;

            warning.classList.add('hidden');
            let result = '';

            switch (type) {
                case 'upper':
                    result = text.toUpperCase();
                    break;
                case 'lower':
                    result = text.toLowerCase();
                    break;
                case 'title':
                    const minorWords = ['a', 'an', 'the', 'and', 'but', 'for', 'or', 'nor', 'at', 'by', 'from', 'in', 'into', 'of', 'off', 'on', 'onto', 'out', 'over', 'to', 'up', 'with', 'as'];
                    const parts = text.toLowerCase().split(/(\s+)/);
                    const wordsOnly = parts.filter((p, i) => i % 2 === 0 && p.length > 0);
                    let wordIndex = 0;
                    result = parts.map((part, i) => {
                        if (i % 2 !== 0 || part.length === 0) return part;
                        
                        const isFirst = wordIndex === 0;
                        const isLast = wordIndex === wordsOnly.length - 1;
                        wordIndex++;

                        if (!isFirst && !isLast && minorWords.includes(part)) {
                            return part;
                        }
                        return part.charAt(0).toUpperCase() + part.slice(1);
                    }).join('');
                    break;
                case 'sentence':
                    result = text.toLowerCase().replace(/(^\s*\w|[.!?]\s*\w|\n\s*\w)/g, c => c.toUpperCase());
                    break;
                case 'first':
                    result = text.toLowerCase().split(/(\s+)/).map(part => {
                        if (part.length === 0 || /^\s+$/.test(part)) return part;
                        return part.charAt(0).toUpperCase() + part.slice(1);
                    }).join('');
                    break;
                case 'toggle':
                    result = text.split('').map(char => {
                        if (char === char.toUpperCase()) return char.toLowerCase();
                        return char.toUpperCase();
                    }).join('');
                    break;
            }

            output.value = result;
        }

        input.addEventListener('input', () => {
            if (output.value) {
                warning.classList.remove('hidden');
            }
        });

        async function copyOutput() {
            if (!output.value) return;
            
            try {
                await navigator.clipboard.writeText(output.value);
                const originalText = copyBtn.innerHTML;
                copyBtn.innerHTML = '<i data-lucide="check" class="w-3.5 h-3.5"></i> Copied!';
                lucide.createIcons();
                setTimeout(() => {
                    copyBtn.innerHTML = originalText;
                    lucide.createIcons();
                }, 2000);
            } catch (err) {
                console.error('Failed to copy: ', err);
            }
        }

        lucide.createIcons();
    </script>
</body>
</html>
