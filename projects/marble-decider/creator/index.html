<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Sawyinator/assets/main/sawyinator.github.io/svg/marble-decider-favicon.svg">
    <meta charset="UTF-8">
    <title>Module Creator | Marble Decider</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        :root {
            --bg: #010a01;
            --ui: #052e16;
            --acc: #64ff4e;
            --danger: #ff4e4e;
            --panel: #0a140a;
            --border: rgba(100, 255, 78, 0.2);
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }

        /* Header / Toolbar */
        header {
            height: 60px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
            z-index: 100;
        }

        .header-left, .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .app-title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            color: var(--acc);
            font-weight: 800;
            letter-spacing: 1px;
            font-size: 1.2rem;
            margin: 0;
            pointer-events: none;
        }

        /* Dropdown Styles */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: var(--panel);
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5);
            z-index: 1000;
            border: 1px solid var(--border);
            border-radius: 4px;
            margin-top: 5px;
        }

        .dropdown-content button {
            color: white;
            padding: 12px 16px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            text-align: left;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .dropdown-content button:last-child {
            border-bottom: none;
        }

        .dropdown-content button:hover {
            background-color: var(--ui);
            color: var(--acc);
        }

        .show {
            display: block;
        }

        /* Sidebars */
        .main-container {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
        }

        #sidebar-left {
            width: 320px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 0;
            box-sizing: border-box;
            z-index: 10;
        }

        #sidebar-right {
            width: 280px;
            background: var(--panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 0;
            box-sizing: border-box;
            z-index: 10;
        }

        .sidebar-section {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-section:last-child {
            border-bottom: none;
        }

        .sidebar-scroll {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
        }

        #canvas-container {
            flex-grow: 1;
            position: relative;
            background: radial-gradient(circle at center, #052e16 0%, #000 100%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            background: transparent;
            cursor: crosshair;
            display: block;
        }

        h2 {
            margin: 0 0 15px 0;
            color: var(--acc);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .tool-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        .ui-btn {
            background: transparent;
            color: var(--acc);
            border: 1px solid var(--acc);
            padding: 8px 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            font-size: 10px;
            text-transform: uppercase;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            white-space: nowrap;
        }

        .ui-btn:hover {
            background: var(--acc);
            color: var(--ui);
        }

        .ui-btn.primary {
            background: var(--acc);
            color: var(--ui);
        }

        .ui-btn.danger {
            border-color: var(--danger);
            color: var(--danger);
        }

        .ui-btn.danger:hover {
            background: var(--danger);
            color: white;
        }

        .ui-btn.sim-active {
            background: var(--danger) !important;
            color: white !important;
            border-color: var(--danger) !important;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 78, 78, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 78, 78, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 78, 78, 0); }
        }

        label {
            display: block;
            font-size: 10px;
            margin-top: 12px;
            opacity: 0.6;
            text-transform: uppercase;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            color: white;
            padding: 8px 12px;
            margin-top: 4px;
            box-sizing: border-box;
            font-size: 12px;
            border-radius: 4px;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--acc);
        }

        .coord-row {
            display: flex;
            gap: 10px;
        }

        .object-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .object-item {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            margin-bottom: 6px;
            padding: 8px 12px;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
        }

        .object-item:hover {
            border-color: var(--acc);
            background: rgba(100, 255, 78, 0.05);
        }

        .object-item.selected {
            background: var(--ui);
            border-color: var(--acc);
        }

        .object-name {
            flex-grow: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }

        .mini-btn {
            width: 24px;
            height: 24px;
            padding: 0;
            font-size: 14px;
            background: transparent;
            border: none;
            color: #666;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }

        .mini-btn:hover {
            color: var(--danger);
            background: rgba(255, 78, 78, 0.1);
        }

        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--acc);
            color: var(--ui);
            padding: 12px 24px;
            font-weight: 800;
            border-radius: 50px;
            z-index: 1000;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .section-header {
            color: var(--acc);
            font-size: 9px;
            margin-top: 20px;
            margin-bottom: 10px;
            opacity: 0.5;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-header::after {
            content: "";
            flex-grow: 1;
            height: 1px;
            background: var(--border);
        }

        .sim-legend {
            margin: 15px 0;
            padding: 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px dashed var(--border);
            font-size: 10px;
            color: #aaa;
            line-height: 1.6;
            border-radius: 4px;
        }

        .sim-legend strong {
            color: var(--acc);
            display: block;
            margin-bottom: 4px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--acc); }

        .back-btn {
            text-decoration: none;
            color: #888;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
        }

        .back-btn:hover {
            color: var(--acc);
        }
    </style>
</head>

<body>

    <header>
        <div class="header-left">
            <a href="/projects/marble-decider/" class="back-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>

                        <button onclick="addShape('triangle'); toggleDropdown(event, 'shape-dropdown')">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 22h20L12 2z"></path></svg>

                        <button onclick="addShape('diamond'); toggleDropdown(event, 'shape-dropdown')">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l9 10-9 10-9-10z"></path></svg>

            <div class="sidebar-scroll">

                    <div class="btn-group" style="margin-top: 15px;">

                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>

            <textarea id="import-area" style="width:100%; height:300px; background:#000; color:var(--acc); border:1px solid var(--border); font-family:monospace; padding:15px; border-radius: 8px; resize: none; box-sizing: border-box;"></textarea>

    <div id="toast">CODE COPIED!</div>

    <script>
        function toggleDropdown(event, id) {
            if (event) event.stopPropagation();
            const dropdown = document.getElementById(id);
            const isShown = dropdown.classList.contains('show');
            
            // Close all dropdowns
            document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('show'));
            
            if (!isShown) {
                dropdown.classList.add('show');
            }
        }

        window.onclick = function(event) {
            if (!event.target.closest('.dropdown')) {
                document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('show'));
            }
        }

        const {
            Engine,
            Render,
            Runner,
            Bodies,
            Composite,
            Body,
            Events
        } = Matter;

        function MatterModuleBuilder(world, y, cx, engine, data) {
            const { Bodies, Body, Composite, Events } = Matter;
            (data || []).forEach(s => {
                const rx = cx + s.relX, ry = y + s.relY;
                const radAngle = s.angle * (Math.PI / 180);
                const opts = { 
                    label: s.name, 
                    isStatic: s.isStatic, 
                    restitution: s.bouncy, 
                    friction: 0, 
                    frictionAir: 0,
                    render: { fillStyle: '#052e16', strokeStyle: '#64ff4e', lineWidth: 4 }, 
                    angle: radAngle 
                };
                if (s.type === 'rectangle') opts.chamfer = { radius: 15 };

                let body;
                if (s.type === 'rectangle') body = Bodies.rectangle(rx, ry, s.w, s.h, opts);
                else if (s.type === 'circle') body = Bodies.circle(rx, ry, s.w, opts);
                else if (s.type === 'triangle') body = Bodies.polygon(rx, ry, 3, s.w, opts);
                else if (s.type === 'diamond') {
                    const verts = [{ x: 0, y: -s.h/2 }, { x: s.w/2, y: 0 }, { x: 0, y: s.h/2 }, { x: -s.w/2, y: 0 }];
                    body = Bodies.fromVertices(rx, ry, [verts], opts);
                } else if (s.type === 'right_triangle') {
                    const verts = [{ x: -s.w/2, y: s.h/2 }, { x: s.w/2, y: s.h/2 }, { x: -s.w/2, y: -s.h/2 }];
                    body = Bodies.fromVertices(rx, ry, [verts], opts);
                }

                if (body) {
                    if (s.flipX !== 1 || s.flipY !== 1) {
                        Body.scale(body, s.flipX, s.flipY);
                        // Fix winding order for selection/collision if flipped
                        if (!Matter.Vertices.clockwise(body.vertices)) {
                            const pos = { x: body.position.x, y: body.position.y };
                            const relativeVertices = body.vertices.map(v => ({ 
                                x: v.x - pos.x, 
                                y: v.y - pos.y 
                            })).reverse();
                            Body.setVertices(body, relativeVertices);
                            Body.setPosition(body, pos);
                        }
                    }
                    body.creatorData = s;
                    body.behaviorData = { behavior: s.behavior, speed: s.speed, origX: rx, origY: ry };
                    if (s.behavior === 'rotate') {
                        Events.on(engine, 'beforeUpdate', () => { Body.setAngle(body, body.angle + s.speed); });
                    } else if (s.behavior === 'oscillate') {
                        Events.on(engine, 'beforeUpdate', (e) => { 
                            Body.setPosition(body, { x: rx + Math.sin(e.timestamp * 0.003) * s.speed * 100, y: ry }); 
                        });
                    }
                    Composite.add(world, body);
                }
            });
        }

        const engine = Engine.create();

        const MARBLE_RADIUS = 20;
        const MOD_WIDTH = 820,
            MOD_HEIGHT = 900;

        let canvasW = document.getElementById('canvas-container').clientWidth;
        let canvasH = document.getElementById('canvas-container').clientHeight;
        let CX = canvasW / 2,
            CY = canvasH / 2;

        const render = Render.create({
            element: document.getElementById('canvas-container'),
            engine: engine,
            options: {
                width: canvasW,
                height: canvasH,
                wireframes: false,
                background: 'transparent'
            }
        });

        Render.run(render);
        const runner = Runner.create();
        const fps = 60;
        const interval = 1000 / fps;
        let then = performance.now();

        function loop(now) {
            requestAnimationFrame(loop);
            const elapsed = now - then;
            if (elapsed > interval) {
                then = now - (elapsed % interval);
                Runner.tick(runner, engine, now);
                Render.world(render);
            }
        }
        requestAnimationFrame(loop);

        let shapes = [],
            marbles = [],
            selectedShape = null,
            isSimulating = false,
            mousePos = {
                x: 0,
                y: 0
            };
        engine.gravity.y = 0;

        window.addEventListener('resize', () => {
            const container = document.getElementById('canvas-container');
            canvasW = container.clientWidth;
            canvasH = container.clientHeight;
            const oldCX = CX;
            const oldCY = CY;
            CX = canvasW / 2;
            CY = canvasH / 2;
            shapes.forEach(s => {
                s.x = (s.x - oldCX) + CX;
                s.y = (s.y - oldCY) + CY;
            });
            render.canvas.width = canvasW;
            render.canvas.height = canvasH;
            render.options.width = canvasW;
            render.options.height = canvasH;
            rebuildWorld();
        });

        Events.on(engine, 'beforeUpdate', (event) => {
            if (!isSimulating) return;
            const time = event.timestamp;
            Composite.allBodies(engine.world).forEach(body => {
                if (body.behaviorData && body.behaviorData.behavior !== 'static') {
                    const s = body.behaviorData;
                    if (s.behavior === 'rotate') Body.setAngle(body, body.angle + s.speed);
                    else if (s.behavior === 'oscillate') {
                        const newX = s.origX + Math.sin(time * 0.003) * (s.speed * 100);
                        Body.setPosition(body, {
                            x: newX,
                            y: s.origY
                        });
                    }
                }
            });
        });

        Events.on(render, 'afterRender', () => {
            const ctx = render.context;
            const left = CX - MOD_WIDTH / 2,
                right = CX + MOD_WIDTH / 2,
                top = CY - MOD_HEIGHT / 2,
                bottom = CY + MOD_HEIGHT / 2;
            ctx.strokeStyle = '#64ff4e';
            ctx.setLineDash([5, 5]);
            ctx.lineWidth = 1.5;
            ctx.globalAlpha = 0.4;
            ctx.strokeRect(left, top, MOD_WIDTH, MOD_HEIGHT);
            ctx.globalAlpha = 0.2;
            ctx.beginPath();
            ctx.moveTo(CX, top);
            ctx.lineTo(CX, bottom);
            ctx.moveTo(left, CY);
            ctx.lineTo(right, CY);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.globalAlpha = 1.0;
        });

        function addShape(type) {
            if (isSimulating) return;
            const newShape = {
                id: Date.now(),
                type,
                x: CX,
                y: CY,
                w: (type === 'circle' || type === 'diamond') ? 80 : 100,
                h: (type === 'circle' || type === 'diamond') ? 80 : 100,
                angle: 0,
                behavior: 'static',
                speed: 0.05,
                name: type + "_" + (shapes.length + 1),
                bouncy: 0.4,
                isStatic: true,
                flipX: 1,
                flipY: 1
            };
            
            // Adjust defaults for specific shapes
            if (type === 'rectangle') {
                newShape.w = 200;
                newShape.h = 60;
            }
            
            shapes.push(newShape);
            rebuildWorld();
            selectShape(newShape.id);
        }

        function getDiamondVertices(w, h) {
            return [
                { x: 0, y: -h/2 },
                { x: w/2, y: 0 },
                { x: 0, y: h/2 },
                { x: -w/2, y: 0 }
            ];
        }

        function rebuildWorld() {
            const currentMarbles = [...marbles];
            Composite.clear(engine.world);
            const wallOpts = {
                isStatic: true,
                render: {
                    visible: false
                }
            };
            const leftWall = Bodies.rectangle(CX - MOD_WIDTH / 2 - 10, CY, 20, MOD_HEIGHT, wallOpts);
            const rightWall = Bodies.rectangle(CX + MOD_WIDTH / 2 + 10, CY, 20, MOD_HEIGHT, wallOpts);
            Composite.add(engine.world, [leftWall, rightWall]);

            shapes.forEach(s => {
                const opts = {
                    label: s.name,
                    isStatic: s.isStatic,
                    restitution: parseFloat(s.bouncy),
                    render: {
                        fillStyle: selectedShape?.id === s.id ? '#1e40af' : '#052e16',
                        strokeStyle: '#64ff4e',
                        lineWidth: 4
                    },
                    angle: s.angle * (Math.PI / 180)
                };
                
                let body;
                const fx = s.flipX || 1;
                const fy = s.flipY || 1;

                if (s.type === 'rectangle') {
                    body = Bodies.rectangle(s.x, s.y, s.w, s.h, {
                        ...opts,
                        chamfer: { radius: 15 }
                    });
                } else if (s.type === 'circle') {
                    body = Bodies.circle(s.x, s.y, s.w, opts);
                } else {
                    let vertices;
                    if (s.type === 'triangle') {
                        const sides = 3;
                        const theta = 2 * Math.PI / sides;
                        vertices = [];
                        for (let i = 0; i < sides; i++) {
                            const angle = i * theta - Math.PI / 2;
                            vertices.push({ x: s.w * Math.cos(angle), y: s.w * Math.sin(angle) });
                        }
                    } else if (s.type === 'diamond') {
                        vertices = getDiamondVertices(s.w, s.h);
                    } else if (s.type === 'right_triangle') {
                        vertices = [
                            { x: -s.w/2, y: s.h/2 },
                            { x: s.w/2, y: s.h/2 },
                            { x: -s.w/2, y: -s.h/2 }
                        ];
                    }

                    if (vertices) {
                        // Apply flip to vertices before creating body to avoid Body.scale bugs
                        const flippedVertices = vertices.map(v => ({ x: v.x * fx, y: v.y * fy }));
                        body = Bodies.fromVertices(s.x, s.y, [flippedVertices], opts);
                    }
                }

                if (body) {
                    body.restitution = parseFloat(s.bouncy);
                    body.originalRadius = s.w;
                    body.behaviorData = {
                        ...s,
                        origX: s.x,
                        origY: s.y
                    };
                    Composite.add(engine.world, body);
                }
            });
            currentMarbles.forEach(m => Composite.add(engine.world, m));
            marbles = currentMarbles;
            updateBrowser();
        }

        function updateBrowser() {
            const list = document.getElementById('object-browser-list');
            list.innerHTML = '';
            [...shapes].reverse().forEach((s, index) => {
                const actualIndex = shapes.length - 1 - index;
                const div = document.createElement('div');
                div.className = `object-item ${selectedShape?.id === s.id ? 'selected' : ''}`;
                div.onclick = () => selectShape(s.id);
                div.innerHTML = `
                    <div class="object-name">${s.name}</div>
                    <div class="btn-group">
                        <button class="mini-btn" onclick="moveShape(${actualIndex}, 1); event.stopPropagation()" title="Move Up" ${actualIndex === shapes.length - 1 ? 'disabled style="opacity:0.2"' : ''}>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
                        </button>
                        <button class="mini-btn" onclick="moveShape(${actualIndex}, -1); event.stopPropagation()" title="Move Down" ${actualIndex === 0 ? 'disabled style="opacity:0.2"' : ''}>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </button>
                        <button class="mini-btn" onclick="deleteShape(${s.id}); event.stopPropagation()" title="Delete">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function moveShape(index, direction) {
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= shapes.length) return;
            const temp = shapes[index];
            shapes[index] = shapes[newIndex];
            shapes[newIndex] = temp;
            rebuildWorld();
        }

        function selectShape(id) {
            selectedShape = shapes.find(s => s.id === id);
            document.getElementById('inspector').style.display = 'block';
            updateInspectorInputs();
            rebuildWorld();
        }

        function updateInspectorInputs() {
            if (!selectedShape) return;
            document.getElementById('prop-name').value = selectedShape.name;
            document.getElementById('prop-x').value = Math.round(selectedShape.x - CX);
            document.getElementById('prop-y').value = Math.round(CY - selectedShape.y);
            document.getElementById('prop-w').value = selectedShape.w;
            document.getElementById('prop-h').value = selectedShape.h;
            document.getElementById('prop-angle').value = selectedShape.angle;
            document.getElementById('prop-bouncy').value = selectedShape.bouncy;
            document.getElementById('prop-isStatic').value = selectedShape.isStatic.toString();
            document.getElementById('prop-behavior').value = selectedShape.behavior;
            document.getElementById('prop-speed').value = selectedShape.speed;
        }

        function updateSelected() {
            if (!selectedShape) return;
            selectedShape.name = document.getElementById('prop-name').value;
            selectedShape.x = (parseInt(document.getElementById('prop-x').value) || 0) + CX;
            selectedShape.y = CY - (parseInt(document.getElementById('prop-y').value) || 0);
            selectedShape.w = parseInt(document.getElementById('prop-w').value) || 1;
            selectedShape.h = parseInt(document.getElementById('prop-h').value) || 1;
            selectedShape.angle = parseInt(document.getElementById('prop-angle').value) || 0;
            selectedShape.bouncy = parseFloat(document.getElementById('prop-bouncy').value) || 0;
            selectedShape.isStatic = document.getElementById('prop-isStatic').value === "true";
            selectedShape.behavior = document.getElementById('prop-behavior').value;
            selectedShape.speed = parseFloat(document.getElementById('prop-speed').value) || 0;
            rebuildWorld();
        }

        function deleteShape(id) {
            shapes = shapes.filter(s => s.id !== id);
            if (selectedShape?.id === id) {
                selectedShape = null;
                document.getElementById('inspector').style.display = 'none';
            }
            rebuildWorld();
        }

        function clearMarbles() {
            marbles.forEach(m => Composite.remove(engine.world, m));
            marbles = [];
        }

        function toggleSim() {
            isSimulating = !isSimulating;
            engine.gravity.y = isSimulating ? 1.5 : 0;
            
            const simBtn = document.getElementById('sim-btn');
            const simBtnText = simBtn.querySelector('span');
            const simBtnIcon = simBtn.querySelector('svg');
            
            if (isSimulating) {
                simBtnText.innerText = "STOP SIMULATION";
                simBtnIcon.innerHTML = '<rect x="6" y="6" width="12" height="12"></rect>';
            } else {
                simBtnText.innerText = "START SIMULATION";
                simBtnIcon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"></polygon>';
            }
            
            simBtn.classList.toggle('sim-active');
            document.getElementById('sim-controls-area').style.display = isSimulating ? 'block' : 'none';
            if (isSimulating) {
                Composite.allBodies(engine.world).forEach(body => {
                    if (body.behaviorData) body.restitution = parseFloat(body.behaviorData.bouncy);
                });
            } else {
                clearMarbles();
            }
            rebuildWorld();
        }

        let dragStartTime = 0;
        const DRAG_DELAY = 200;
        const DRAG_DIST_THRESHOLD = 50;
        let isActuallyDragging = false;
        let clickOffset = { x: 0, y: 0 };
        let startMousePos = { x: 0, y: 0 };

        render.canvas.addEventListener('mousedown', (e) => {
            if (isSimulating) return;
            const rect = render.canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left,
                my = e.clientY - rect.top;
            
            // Improved selection: click anywhere on shape
            const allBodies = Composite.allBodies(engine.world).filter(b => b.label && !b.label.includes('wall'));
            const clickedBodies = Matter.Query.point(allBodies, { x: mx, y: my });
            
            if (clickedBodies.length > 0) {
                // Find the shape corresponding to the clicked body (highest in draw order)
                const body = clickedBodies[clickedBodies.length - 1];
                const shape = shapes.find(s => s.name === body.label);
                
                if (shape) {
                    selectShape(shape.id);
                    isDragging = true;
                    dragStartTime = Date.now();
                    isActuallyDragging = false;
                    startMousePos = { x: mx, y: my };
                    clickOffset = { x: mx - shape.x, y: my - shape.y };
                }
            } else {
                selectedShape = null;
                document.getElementById('inspector').style.display = 'none';
                rebuildWorld();
            }
        });

        render.canvas.addEventListener('mousemove', (e) => {
            const rect = render.canvas.getBoundingClientRect();
            mousePos.x = e.clientX - rect.left;
            mousePos.y = e.clientY - rect.top;
            
            if (isDragging && selectedShape && !isSimulating) {
                const timeHeld = Date.now() - dragStartTime;
                const distMoved = Math.hypot(mousePos.x - startMousePos.x, mousePos.y - startMousePos.y);
                
                if (timeHeld > DRAG_DELAY || distMoved > DRAG_DIST_THRESHOLD) {
                    isActuallyDragging = true;
                    selectedShape.x = Math.round(mousePos.x - clickOffset.x);
                    selectedShape.y = Math.round(mousePos.y - clickOffset.y);
                    rebuildWorld();
                    updateInspectorInputs();
                }
            }
        });
        window.addEventListener('mouseup', () => isDragging = false);

        window.addEventListener('keydown', (e) => {
            if (!isSimulating) return;
            if (e.key.toLowerCase() === 's') {
                const m = Bodies.circle(mousePos.x, mousePos.y, MARBLE_RADIUS, {
                    restitution: 0.5,
                    friction: 0.001,
                    frictionAir: 0.01,
                    render: {
                        fillStyle: `hsl(${Math.random()*360}, 80%, 60%)`
                    }
                });
                marbles.push(m);
                Composite.add(engine.world, m);
            }
            if (e.key.toLowerCase() === 'c') clearMarbles();
        });

        function generateCode() {
            const shapesData = shapes.map(s => ({
                id: s.id,
                name: s.name,
                type: s.type,
                relX: Math.round(s.x - CX),
                relY: Math.round(s.y - CY) + 450,
                w: s.w,
                h: s.h,
                angle: s.angle,
                isStatic: s.isStatic,
                bouncy: s.bouncy,
                behavior: s.behavior,
                speed: s.speed,
                flipX: s.flipX || 1,
                flipY: s.flipY || 1
            }));

            const dataJson = JSON.stringify(shapesData, null, 4);

            let code = `{\n    name: "Custom Module",\n`;
            code += `    shapesData: ${dataJson.replace(/\n/g, '\n    ')},\n`;
            code += `    create: function(world, y, cx, engine) {\n`;
            code += `        MatterModuleBuilder(world, y, cx, engine, this.shapesData);\n`;
            code += `    }\n}`;

            navigator.clipboard.writeText(code).then(() => {
                showToast("CODE COPIED!");
            });
        }

        function showImportPrompt() {
            document.getElementById('import-overlay').style.display = 'flex';
            document.getElementById('import-area').value = '';
        }

        async function processImport() {
            let rawInput = document.getElementById('import-area').value.trim();
            try {
                const sanitizedInput = rawInput.replace(/^const\s+\w+\s*=\s*/, '').replace(/;$/, '');
                let moduleObj;
                try {
                    moduleObj = eval(`(${sanitizedInput})`);
                } catch (e) {
                    throw new Error("Syntax error in pasted code.");
                }

                if (moduleObj.shapesData && Array.isArray(moduleObj.shapesData)) {
                    shapes = moduleObj.shapesData.map(s => ({
                        ...s,
                        id: s.id || (Date.now() + Math.random()),
                        x: s.relX + CX,
                        y: s.relY + CY - 450
                    }));
                    rebuildWorld();
                    document.getElementById('import-overlay').style.display = 'none';
                    showToast("MODULE IMPORTED!");
                } else {
                    throw new Error("Invalid module format. Please use code generated by the current Module Creator.");
                }
            } catch (e) {
                console.error("Import error:", e);
                showCustomAlert("IMPORT FAILED", e.message);
            }
        }

        function showCustomAlert(title, msg) {
            const modal = document.getElementById('custom-alert-modal');
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-msg').innerText = msg;
            modal.style.display = 'flex';
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => {
                t.style.display = 'none';
                t.innerText = "CODE COPIED!";
            }, 1500);
        }
        rebuildWorld();

        function centerSelected() {
            if (!selectedShape) return;
            selectedShape.x = CX;
            selectedShape.y = CY;
            rebuildWorld();
            updateInspectorInputs();
        }

        function toggleFlip(axis) {
            if (!selectedShape) return;
            if (axis === 'X') selectedShape.flipX = (selectedShape.flipX || 1) * -1;
            if (axis === 'Y') selectedShape.flipY = (selectedShape.flipY || 1) * -1;
            rebuildWorld();
        }

        function duplicateSelected() {
            if (!selectedShape) return;

            // Create a deep copy of the selected shape
            const newShape = {
                ...selectedShape,
                id: Date.now(), // New unique ID
                name: selectedShape.name + "_copy",
            };

            shapes.push(newShape);
            rebuildWorld();

            // Automatically select the new copy
            selectShape(newShape.id);
        }
    </script>
    <div id="custom-alert-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; align-items:center; justify-content:center; padding:20px;">
        <div class="ui-card" style="max-width:400px; width:100%; text-align:center;">
            <h2 id="alert-title" style="margin-bottom:10px; color:#64ff4e;"></h2>
            <p id="alert-msg" style="margin-bottom:20px; opacity:0.8;"></p>
            <button class="ui-btn" onclick="document.getElementById('custom-alert-modal').style.display='none'">OK</button>
        </div>
    </div>
</body>

</html>
