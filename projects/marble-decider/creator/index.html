<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Sawyinator/assets/main/sawyinator.github.io/favicons/marble-decider-favicon.png">
    <meta charset="UTF-8">
    <title>Module Creator | Marble Decider</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root {
            --bg: #010a01;
            --ui: #052e16;
            --acc: #64ff4e;
            --danger: #ff4e4e;
            --panel: #0a140a;
            --border: rgba(100, 255, 78, 0.2);
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }

        /* Header / Toolbar */
        header {
            height: 60px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
            z-index: 100;
        }

        .header-left, .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .app-title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            color: var(--acc);
            font-weight: 800;
            letter-spacing: 1px;
            font-size: 1.2rem;
            margin: 0;
            pointer-events: none;
        }

        /* Dropdown Styles */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: var(--panel);
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5);
            z-index: 1000;
            border: 1px solid var(--border);
            border-radius: 4px;
            margin-top: 5px;
        }

        .dropdown-content button {
            color: white;
            padding: 12px 16px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            text-align: left;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .dropdown-content button:last-child {
            border-bottom: none;
        }

        .dropdown-content button:hover {
            background-color: var(--ui);
            color: var(--acc);
        }

        .show {
            display: block;
        }

        /* Sidebars */
        .main-container {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
        }

        #sidebar-left {
            width: 320px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 0;
            box-sizing: border-box;
            z-index: 10;
        }

        #sidebar-right {
            width: 280px;
            background: var(--panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 0;
            box-sizing: border-box;
            z-index: 10;
        }

        .sidebar-section {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-section:last-child {
            border-bottom: none;
        }

        .sidebar-scroll {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
        }

        #canvas-container {
            flex-grow: 1;
            position: relative;
            background: radial-gradient(circle at center, #052e16 0%, #000 100%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            background: transparent;
            cursor: crosshair;
            display: block;
        }

        h2 {
            margin: 0 0 15px 0;
            color: var(--acc);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .tool-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        .ui-btn {
            background: transparent;
            color: var(--acc);
            border: 1px solid var(--acc);
            padding: 8px 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            font-size: 10px;
            text-transform: uppercase;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            white-space: nowrap;
        }

        .ui-btn:hover {
            background: var(--acc);
            color: var(--ui);
        }

        .ui-btn.primary {
            background: var(--acc);
            color: var(--ui);
        }

        .ui-btn.danger {
            border-color: var(--danger);
            color: var(--danger);
        }

        .ui-btn.danger:hover {
            background: var(--danger);
            color: white;
        }

        .ui-btn.sim-active {
            background: var(--danger) !important;
            color: white !important;
            border-color: var(--danger) !important;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 78, 78, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 78, 78, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 78, 78, 0); }
        }

        label {
            display: block;
            font-size: 10px;
            margin-top: 12px;
            opacity: 0.6;
            text-transform: uppercase;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            color: white;
            padding: 8px 12px;
            margin-top: 4px;
            box-sizing: border-box;
            font-size: 12px;
            border-radius: 4px;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--acc);
        }

        .coord-row {
            display: flex;
            gap: 10px;
        }

        .object-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .object-item {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            margin-bottom: 6px;
            padding: 8px 12px;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
        }

        .object-item:hover {
            border-color: var(--acc);
            background: rgba(100, 255, 78, 0.05);
        }

        .object-item.selected {
            background: var(--ui);
            border-color: var(--acc);
        }

        .object-name {
            flex-grow: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }

        .mini-btn {
            width: 24px;
            height: 24px;
            padding: 0;
            font-size: 14px;
            background: transparent;
            border: none;
            color: #666;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }

        .mini-btn:hover {
            color: var(--danger);
            background: rgba(255, 78, 78, 0.1);
        }

        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--acc);
            color: var(--ui);
            padding: 12px 24px;
            font-weight: 800;
            border-radius: 50px;
            z-index: 1000;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .section-header {
            color: var(--acc);
            font-size: 9px;
            margin-top: 20px;
            margin-bottom: 10px;
            opacity: 0.5;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-header::after {
            content: "";
            flex-grow: 1;
            height: 1px;
            background: var(--border);
        }

        .sim-legend {
            margin: 15px 0;
            padding: 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px dashed var(--border);
            font-size: 10px;
            color: #aaa;
            line-height: 1.6;
            border-radius: 4px;
        }

        .sim-legend strong {
            color: var(--acc);
            display: block;
            margin-bottom: 4px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--acc); }

        .back-btn {
            text-decoration: none;
            color: #888;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
        }

        .back-btn:hover {
            color: var(--acc);
        }
    </style>
</head>

<body>

    <header>
        <div class="header-left">
            <a href="/projects/marble-decider/" class="back-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                LOBBY
            </a>
        </div>
        <h1 class="app-title">MODULE CREATOR</h1>
        <div class="header-right">
            <button onclick="showImportPrompt()" class="ui-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                IMPORT
            </button>
            <button onclick="generateCode()" class="ui-btn primary">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                COPY CODE
            </button>
        </div>
    </header>

    <div class="main-container">
        <div id="sidebar-left">
            <div class="sidebar-section">
                <h2>Creation Tools</h2>
                <div class="dropdown" style="width: 100%;">
                    <button class="ui-btn" onclick="toggleDropdown(event, 'shape-dropdown')" style="width: 100%;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"></path></svg>
                        ADD SHAPE
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left: auto;"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </button>
                    <div id="shape-dropdown" class="dropdown-content" style="width: 100%;">
                        <button onclick="addShape('rectangle'); toggleDropdown(event, 'shape-dropdown')">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
                            RECTANGLE
                        </button>
                        <button onclick="addShape('circle'); toggleDropdown(event, 'shape-dropdown')">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle></svg>
                            CIRCLE
                        </button>
                        <button onclick="addShape('triangle'); toggleDropdown(event, 'shape-dropdown')">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 22h20L12 2z"></path></svg>
                            TRIANGLE
                        </button>
                    </div>
                </div>
            </div>

            <div class="sidebar-scroll">
                <div id="inspector" style="display:none;">
                    <h2>Inspector</h2>
                    <label>Object Name</label>
                    <input type="text" id="prop-name" oninput="updateSelected()">

                    <div class="btn-group" style="margin-top: 15px;">
                        <button class="ui-btn" onclick="duplicateSelected()" style="flex: 1;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            DUP
                        </button>
                        <button class="ui-btn danger" onclick="deleteShape(selectedShape.id)" style="flex: 1;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            DEL
                        </button>
                    </div>

                    <div class="section-header">TRANSFORM</div>
                    <div class="coord-row">
                        <div style="flex:1;"><label>Rel X</label><input type="number" id="prop-x" oninput="updateSelected()"></div>
                        <div style="flex:1;"><label>Rel Y</label><input type="number" id="prop-y" oninput="updateSelected()"></div>
                    </div>
                    <div class="coord-row">
                        <div style="flex:1;"><label>W / Rad</label><input type="number" id="prop-w" oninput="updateSelected()"></div>
                        <div style="flex:1;"><label>Height</label><input type="number" id="prop-h" oninput="updateSelected()"></div>
                    </div>
                    <label>Rotation (Deg)</label>
                    <input type="number" id="prop-angle" oninput="updateSelected()">
                    
                    <button class="ui-btn" onclick="centerSelected()" style="width: 100%; margin-top: 10px;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="22" y1="12" x2="18" y2="12"></line><line x1="6" y1="12" x2="2" y2="12"></line><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="22" x2="12" y2="18"></line></svg>
                        CENTER OBJECT
                    </button>

                    <div class="section-header">PHYSICS</div>
                    <div class="coord-row">
                        <div style="flex:1;"><label title="Bounciness (0-1)">Bounciness</label><input type="number" step="0.1" id="prop-bouncy" oninput="updateSelected()"></div>
                        <div style="flex:1;">
                            <label>Body Type</label>
                            <select id="prop-isStatic" onchange="updateSelected()">
                                <option value="true">Fixed</option>
                                <option value="false">Physics</option>
                            </select>
                        </div>
                    </div>

                    <div class="section-header">BEHAVIOR</div>
                    <select id="prop-behavior" onchange="updateSelected()">
                        <option value="static">No Movement</option>
                        <option value="rotate">Rotate</option>
                        <option value="oscillate">Oscillate X</option>
                    </select>
                    <label>Speed / Amp</label>
                    <input type="number" step="0.01" id="prop-speed" oninput="updateSelected()">
                </div>
            </div>

            <div class="sidebar-section">
                <div id="sim-controls-area" style="display:none;">
                    <div class="sim-legend">
                        <strong>SIMULATION ACTIVE</strong>
                        [S] Spawn Marble<br>
                        [C] Clear Marbles
                    </div>
                    <button class="ui-btn danger" onclick="clearMarbles()" style="width: 100%; margin-bottom: 10px;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                        CLEAR MARBLES
                    </button>
                </div>
                <button class="ui-btn" onclick="toggleSim()" id="sim-btn" style="width: 100%; border-width: 2px;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="play-icon"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    <span>START SIMULATION</span>
                </button>
            </div>
        </div>

        <div id="canvas-container"></div>

        <div id="sidebar-right">
            <div class="sidebar-scroll">
                <h2>Object Browser</h2>
                <div id="object-browser-list" class="object-list"></div>
            </div>
        </div>
    </div>

    <div id="import-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:1000; display:none; align-items:center; justify-content:center; padding:40px;">
        <div style="background: var(--panel); border: 1px solid var(--acc); padding: 30px; border-radius: 12px; width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 20px;">
            <h2 style="margin: 0;">Import Module Code</h2>
            <p style="font-size: 0.8rem; opacity: 0.7; margin: 0;">Paste the code generated from the Module Creator to load it back for editing.</p>
            <textarea id="import-area" style="width:100%; height:300px; background:#000; color:var(--acc); border:1px solid var(--border); font-family:monospace; padding:15px; border-radius: 8px; resize: none;"></textarea>
            <div style="display:flex; gap:10px; justify-content: flex-end;">
                <button class="ui-btn" onclick="document.getElementById('import-overlay').style.display='none'">CANCEL</button>
                <button class="ui-btn primary" onclick="processImport()">LOAD MODULE</button>
            </div>
        </div>
    </div>

    <div id="toast">CODE COPIED!</div>

    <script>
        function toggleDropdown(event, id) {
            if (event) event.stopPropagation();
            const dropdown = document.getElementById(id);
            const isShown = dropdown.classList.contains('show');
            
            // Close all dropdowns
            document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('show'));
            
            if (!isShown) {
                dropdown.classList.add('show');
            }
        }

        window.onclick = function(event) {
            if (!event.target.closest('.dropdown')) {
                document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('show'));
            }
        }

        const {
            Engine,
            Render,
            Runner,
            Bodies,
            Composite,
            Body,
            Events
        } = Matter;
        const engine = Engine.create();

        const MARBLE_RADIUS = 20;
        const MOD_WIDTH = 820,
            MOD_HEIGHT = 900;

        let canvasW = document.getElementById('canvas-container').clientWidth;
        let canvasH = document.getElementById('canvas-container').clientHeight;
        let CX = canvasW / 2,
            CY = canvasH / 2;

        const render = Render.create({
            element: document.getElementById('canvas-container'),
            engine: engine,
            options: {
                width: canvasW,
                height: canvasH,
                wireframes: false,
                background: 'transparent'
            }
        });

        Render.run(render);
        const runner = Runner.create();
        const fps = 60;
        const interval = 1000 / fps;
        let then = performance.now();

        function loop(now) {
            requestAnimationFrame(loop);
            const elapsed = now - then;
            if (elapsed > interval) {
                then = now - (elapsed % interval);
                Runner.tick(runner, engine, now);
                Render.world(render);
            }
        }
        requestAnimationFrame(loop);

        let shapes = [],
            marbles = [],
            selectedShape = null,
            isSimulating = false,
            mousePos = {
                x: 0,
                y: 0
            };
        engine.gravity.y = 0;

        window.addEventListener('resize', () => {
            const container = document.getElementById('canvas-container');
            canvasW = container.clientWidth;
            canvasH = container.clientHeight;
            const oldCX = CX;
            const oldCY = CY;
            CX = canvasW / 2;
            CY = canvasH / 2;
            shapes.forEach(s => {
                s.x = (s.x - oldCX) + CX;
                s.y = (s.y - oldCY) + CY;
            });
            render.canvas.width = canvasW;
            render.canvas.height = canvasH;
            render.options.width = canvasW;
            render.options.height = canvasH;
            rebuildWorld();
        });

        Events.on(engine, 'beforeUpdate', (event) => {
            if (!isSimulating) return;
            const time = event.timestamp;
            Composite.allBodies(engine.world).forEach(body => {
                if (body.behaviorData && body.behaviorData.behavior !== 'static') {
                    const s = body.behaviorData;
                    if (s.behavior === 'rotate') Body.setAngle(body, body.angle + s.speed);
                    else if (s.behavior === 'oscillate') {
                        const newX = s.origX + Math.sin(time * 0.003) * (s.speed * 100);
                        Body.setPosition(body, {
                            x: newX,
                            y: s.origY
                        });
                    }
                }
            });
        });

        Events.on(render, 'afterRender', () => {
            const ctx = render.context;
            const left = CX - MOD_WIDTH / 2,
                right = CX + MOD_WIDTH / 2,
                top = CY - MOD_HEIGHT / 2,
                bottom = CY + MOD_HEIGHT / 2;
            ctx.strokeStyle = '#64ff4e';
            ctx.setLineDash([5, 5]);
            ctx.lineWidth = 1.5;
            ctx.globalAlpha = 0.4;
            ctx.strokeRect(left, top, MOD_WIDTH, MOD_HEIGHT);
            ctx.globalAlpha = 0.2;
            ctx.beginPath();
            ctx.moveTo(CX, top);
            ctx.lineTo(CX, bottom);
            ctx.moveTo(left, CY);
            ctx.lineTo(right, CY);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.globalAlpha = 1.0;
        });

        function addShape(type) {
            if (isSimulating) return;
            const newShape = {
                id: Date.now(),
                type,
                x: CX,
                y: CY,
                w: type === 'circle' ? 60 : 200,
                h: 60,
                angle: 0,
                behavior: 'static',
                speed: 0.05,
                name: type + "_" + (shapes.length + 1),
                bouncy: 0.4,
                isStatic: true
            };
            shapes.push(newShape);
            rebuildWorld();
            selectShape(newShape.id);
        }

        function rebuildWorld() {
            const currentMarbles = [...marbles];
            Composite.clear(engine.world);
            const wallOpts = {
                isStatic: true,
                render: {
                    visible: false
                }
            };
            const leftWall = Bodies.rectangle(CX - MOD_WIDTH / 2 - 10, CY, 20, MOD_HEIGHT, wallOpts);
            const rightWall = Bodies.rectangle(CX + MOD_WIDTH / 2 + 10, CY, 20, MOD_HEIGHT, wallOpts);
            Composite.add(engine.world, [leftWall, rightWall]);

            shapes.forEach(s => {
                const opts = {
                    label: s.name,
                    isStatic: s.isStatic,
                    restitution: parseFloat(s.bouncy),
                    render: {
                        fillStyle: selectedShape?.id === s.id ? '#1e40af' : '#052e16',
                        strokeStyle: '#64ff4e',
                        lineWidth: 4
                    },
                    angle: s.angle * (Math.PI / 180)
                };
                let body;
                if (s.type === 'rectangle') body = Bodies.rectangle(s.x, s.y, s.w, s.h, {
                    ...opts,
                    chamfer: {
                        radius: 15
                    }
                });
                else if (s.type === 'circle') body = Bodies.circle(s.x, s.y, s.w, opts);
                else if (s.type === 'triangle') body = Bodies.polygon(s.x, s.y, 3, s.w, opts);

                body.restitution = parseFloat(s.bouncy);
                body.originalRadius = s.w;
                body.behaviorData = {
                    ...s,
                    origX: s.x,
                    origY: s.y
                };
                Composite.add(engine.world, body);
            });
            currentMarbles.forEach(m => Composite.add(engine.world, m));
            marbles = currentMarbles;
            updateBrowser();
        }

        function updateBrowser() {
            const list = document.getElementById('object-browser-list');
            list.innerHTML = '';
            [...shapes].reverse().forEach((s, index) => {
                const actualIndex = shapes.length - 1 - index;
                const div = document.createElement('div');
                div.className = `object-item ${selectedShape?.id === s.id ? 'selected' : ''}`;
                div.onclick = () => selectShape(s.id);
                div.innerHTML = `
                    <div class="object-name">${s.name}</div>
                    <div class="btn-group">
                        <button class="mini-btn" onclick="moveShape(${actualIndex}, 1); event.stopPropagation()" title="Move Up" ${actualIndex === shapes.length - 1 ? 'disabled style="opacity:0.2"' : ''}>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
                        </button>
                        <button class="mini-btn" onclick="moveShape(${actualIndex}, -1); event.stopPropagation()" title="Move Down" ${actualIndex === 0 ? 'disabled style="opacity:0.2"' : ''}>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </button>
                        <button class="mini-btn" onclick="deleteShape(${s.id}); event.stopPropagation()" title="Delete">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function moveShape(index, direction) {
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= shapes.length) return;
            const temp = shapes[index];
            shapes[index] = shapes[newIndex];
            shapes[newIndex] = temp;
            rebuildWorld();
        }

        function selectShape(id) {
            selectedShape = shapes.find(s => s.id === id);
            document.getElementById('inspector').style.display = 'block';
            updateInspectorInputs();
            rebuildWorld();
        }

        function updateInspectorInputs() {
            if (!selectedShape) return;
            document.getElementById('prop-name').value = selectedShape.name;
            document.getElementById('prop-x').value = Math.round(selectedShape.x - CX);
            document.getElementById('prop-y').value = Math.round(CY - selectedShape.y);
            document.getElementById('prop-w').value = selectedShape.w;
            document.getElementById('prop-h').value = selectedShape.h;
            document.getElementById('prop-angle').value = selectedShape.angle;
            document.getElementById('prop-bouncy').value = selectedShape.bouncy;
            document.getElementById('prop-isStatic').value = selectedShape.isStatic.toString();
            document.getElementById('prop-behavior').value = selectedShape.behavior;
            document.getElementById('prop-speed').value = selectedShape.speed;
        }

        function updateSelected() {
            if (!selectedShape) return;
            selectedShape.name = document.getElementById('prop-name').value;
            selectedShape.x = (parseInt(document.getElementById('prop-x').value) || 0) + CX;
            selectedShape.y = CY - (parseInt(document.getElementById('prop-y').value) || 0);
            selectedShape.w = parseInt(document.getElementById('prop-w').value) || 1;
            selectedShape.h = parseInt(document.getElementById('prop-h').value) || 1;
            selectedShape.angle = parseInt(document.getElementById('prop-angle').value) || 0;
            selectedShape.bouncy = parseFloat(document.getElementById('prop-bouncy').value) || 0;
            selectedShape.isStatic = document.getElementById('prop-isStatic').value === "true";
            selectedShape.behavior = document.getElementById('prop-behavior').value;
            selectedShape.speed = parseFloat(document.getElementById('prop-speed').value) || 0;
            rebuildWorld();
        }

        function deleteShape(id) {
            shapes = shapes.filter(s => s.id !== id);
            if (selectedShape?.id === id) {
                selectedShape = null;
                document.getElementById('inspector').style.display = 'none';
            }
            rebuildWorld();
        }

        function clearMarbles() {
            marbles.forEach(m => Composite.remove(engine.world, m));
            marbles = [];
        }

        function toggleSim() {
            isSimulating = !isSimulating;
            engine.gravity.y = isSimulating ? 1.5 : 0;
            
            const simBtn = document.getElementById('sim-btn');
            const simBtnText = simBtn.querySelector('span');
            const simBtnIcon = simBtn.querySelector('svg');
            
            if (isSimulating) {
                simBtnText.innerText = "STOP SIMULATION";
                simBtnIcon.innerHTML = '<rect x="6" y="6" width="12" height="12"></rect>';
            } else {
                simBtnText.innerText = "START SIMULATION";
                simBtnIcon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"></polygon>';
            }
            
            simBtn.classList.toggle('sim-active');
            document.getElementById('sim-controls-area').style.display = isSimulating ? 'block' : 'none';
            if (isSimulating) {
                Composite.allBodies(engine.world).forEach(body => {
                    if (body.behaviorData) body.restitution = parseFloat(body.behaviorData.bouncy);
                });
            } else {
                clearMarbles();
            }
            rebuildWorld();
        }

        render.canvas.addEventListener('mousedown', (e) => {
            if (isSimulating) return;
            const rect = render.canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left,
                my = e.clientY - rect.top;
            const clicked = [...shapes].reverse().find(s => Math.abs(s.x - mx) < 50 && Math.abs(s.y - my) < 50);
            if (clicked) {
                selectShape(clicked.id);
                isDragging = true;
            } else {
                selectedShape = null;
                document.getElementById('inspector').style.display = 'none';
                rebuildWorld();
            }
        });

        let isDragging = false;
        render.canvas.addEventListener('mousemove', (e) => {
            const rect = render.canvas.getBoundingClientRect();
            mousePos.x = e.clientX - rect.left;
            mousePos.y = e.clientY - rect.top;
            if (isDragging && selectedShape && !isSimulating) {
                selectedShape.x = Math.round(mousePos.x);
                selectedShape.y = Math.round(mousePos.y);
                rebuildWorld();
                updateInspectorInputs();
            }
        });
        window.addEventListener('mouseup', () => isDragging = false);

        window.addEventListener('keydown', (e) => {
            if (!isSimulating) return;
            if (e.key.toLowerCase() === 's') {
                const m = Bodies.circle(mousePos.x, mousePos.y, MARBLE_RADIUS, {
                    restitution: 0.5,
                    friction: 0.001,
                    frictionAir: 0.01,
                    render: {
                        fillStyle: `hsl(${Math.random()*360}, 80%, 60%)`
                    }
                });
                marbles.push(m);
                Composite.add(engine.world, m);
            }
            if (e.key.toLowerCase() === 'c') clearMarbles();
        });

        function generateCode() {
            let code = `{\n    name: "Custom Module",\n    create: (world, y, cx, engine) => {\n`;

            selectedShape = null;
            document.getElementById('inspector').style.display = 'none';
            rebuildWorld();

            shapes.forEach(s => {
                const safeName = "obj_" + s.id;

                const relX = `cx + (${Math.round(s.x - CX)})`;
                const relY = `y + (${Math.round(s.y - CY)} + 450)`;
                const radAngle = (s.angle * (Math.PI / 180)).toFixed(3);

                const chamferValue = (s.type === 'rectangle') ? `, chamfer: { radius: 15 }` : '';
                const style = `{ label: '${s.name}', isStatic: ${s.isStatic}${chamferValue}, render: { fillStyle: '#052e16', strokeStyle: '#64ff4e', lineWidth: 4 }, angle: ${radAngle} }`;

                if (s.type === 'rectangle') {
                    code += `        const ${safeName} = Bodies.rectangle(${relX}, ${relY}, ${s.w}, ${s.h}, ${style});\n`;
                    code += `        ${safeName}.originalWidth = ${s.w};\n`;
                    code += `        ${safeName}.originalHeight = ${s.h};\n`;
                } else if (s.type === 'circle') {
                    code += `        const ${safeName} = Bodies.circle(${relX}, ${relY}, ${s.w}, ${style});\n`;
                } else if (s.type === 'triangle') {
                    code += `        const ${safeName} = Bodies.polygon(${relX}, ${relY}, 3, ${s.w}, ${style});\n`;
                    code += `        ${safeName}.originalRadius = ${s.w};\n`;
                }

                code += `        ${safeName}.restitution = ${s.bouncy};\n`;
                code += `        ${safeName}.friction = 0;\n`;
                code += `        ${safeName}.frictionStatic = 0;\n`;
                code += `        ${safeName}.behaviorData = { behavior: '${s.behavior}', speed: ${s.speed}, origX: ${relX}, origY: ${relY} };\n`;

                if (s.behavior === 'rotate') {
                    code += `        Events.on(engine, 'beforeUpdate', () => { Body.setAngle(${safeName}, ${safeName}.angle + ${s.speed}); });\n`;
                } else if (s.behavior === 'oscillate') {
                    code += `        Events.on(engine, 'beforeUpdate', (e) => { Body.setPosition(${safeName}, { x: ${relX} + Math.sin(e.timestamp * 0.003) * ${s.speed * 100}, y: ${relY} }); });\n`;
                }

                code += `        Composite.add(world, ${safeName});\n\n`;
            });

            code += `    }\n}`;
            navigator.clipboard.writeText(code).then(() => {
                showToast("CODE COPIED!");
            });
        }

        function showImportPrompt() {
            document.getElementById('import-overlay').style.display = 'flex';
            document.getElementById('import-area').value = '';
        }

        async function processImport() {
            let rawInput = document.getElementById('import-area').value.trim();
            try {
                const sanitizedInput = rawInput.replace(/^const\s+\w+\s*=\s*/, '').replace(/;$/, '');
                let moduleObj;
                try {
                    moduleObj = eval(`(${sanitizedInput})`);
                } catch (e) {
                    throw new Error("Syntax error in pasted code.");
                }
                const capturedBodies = [];
                const originalAdd = Composite.add;
                const originalEventsOn = Events.on;
                Composite.add = (world, body) => {
                    if (Array.isArray(body)) capturedBodies.push(...body);
                    else capturedBodies.push(body);
                };
                Events.on = () => {}; // Disable events during import execution

                moduleObj.create({
                    bodies: []
                }, CY - 450, CX, engine);

                Composite.add = originalAdd;
                Events.on = originalEventsOn;

                shapes = capturedBodies.map(body => {
                    let type = 'rectangle';
                    if (body.circleRadius) type = 'circle';
                    else if (body.vertices.length === 3) type = 'triangle';
                    const bodyName = (body.label && !body.label.includes('Body')) ? body.label : (type + "_" + Math.floor(Math.random() * 1000));

                    // Regex search specifically for the restitution value assigned to this specific object in the string
                    const restRegex = new RegExp(`${bodyName}.*?restitution:\\s*([0-9.]+)`);
                    const restMatch = sanitizedInput.match(restRegex);
                    const capturedRest = restMatch ? parseFloat(restMatch[1]) : (body.restitution || 0.4);

                    const shapeData = {
                        id: Date.now() + Math.random(),
                        name: bodyName,
                        type: type,
                        x: body.position.x,
                        y: body.position.y,
                        w: body.circleRadius || body.originalRadius || body.originalWidth || calculateWidth(body),
                        h: type === 'rectangle' ? (body.originalHeight || calculateHeight(body)) : 0,
                        angle: Math.round(body.angle * (180 / Math.PI)),
                        isStatic: body.isStatic,
                        bouncy: capturedRest,
                        behavior: body.behaviorData?.behavior || 'static',
                        speed: body.behaviorData?.speed || 0.05
                    };

                    if (shapeData.behavior === 'static') {
                        const normalizedText = sanitizedInput.replace(/\s+/g, ' ');
                        const searchName = bodyName;
                        if (normalizedText.includes(`Body.setAngle(${searchName}`)) {
                            shapeData.behavior = 'rotate';
                            const speedMatch = normalizedText.match(new RegExp(`${searchName}\\.angle\\s*\\+\\s*([0-9.]+)`));
                            if (speedMatch) shapeData.speed = parseFloat(speedMatch[1]);
                        } else if (normalizedText.includes(`Body.setPosition(${searchName}`)) {
                            shapeData.behavior = 'oscillate';
                            const ampMatch = normalizedText.match(new RegExp(`Math.sin\\(.*?\\)\\s*\\*\\s*([0-9.]+)`));
                            if (ampMatch) shapeData.speed = parseFloat(ampMatch[1]) / 100;
                        }
                    }
                    return shapeData;
                });
                rebuildWorld();
                document.getElementById('import-overlay').style.display = 'none';
                showToast("MODULE IMPORTED!");
            } catch (e) {
                console.error("Import Error:", e);
                alert("Import Error: " + e.message);
            }
        }

        function calculateWidth(body) {
            if (body.circleRadius) return body.circleRadius;

            // If it's a triangle, we want the radius (distance from center to vertex)
            if (body.vertices.length === 3) {
                const v = body.vertices[0];
                return Math.sqrt(Math.pow(v.x - body.position.x, 2) + Math.pow(v.y - body.position.y, 2));
            }

            // For rectangles, rotate vertices back to calculate original width
            const angle = -body.angle;
            const cos = Math.cos(angle);
            const sin = Math.sin(angle);
            const cx = body.position.x;
            const cy = body.position.y;

            const xs = body.vertices.map(v => {
                const dx = v.x - cx;
                const dy = v.y - cy;
                return (dx * cos - dy * sin);
            });
            return Math.max(...xs) - Math.min(...xs);
        }

        function calculateHeight(body) {
            if (body.circleRadius || body.vertices.length === 3) return 0;

            const angle = -body.angle;
            const cos = Math.cos(angle);
            const sin = Math.sin(angle);
            const cx = body.position.x;
            const cy = body.position.y;

            const ys = body.vertices.map(v => {
                const dx = v.x - cx;
                const dy = v.y - cy;
                return (dx * sin + dy * cos);
            });
            return Math.max(...ys) - Math.min(...ys);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => {
                t.style.display = 'none';
                t.innerText = "CODE COPIED!";
            }, 1500);
        }
        rebuildWorld();

        function centerSelected() {
            if (!selectedShape) return;
            selectedShape.x = CX;
            selectedShape.y = CY;
            rebuildWorld();
            updateInspectorInputs();
        }

        function duplicateSelected() {
            if (!selectedShape) return;

            // Create a deep copy of the selected shape
            const newShape = {
                ...selectedShape,
                id: Date.now(), // New unique ID
                name: selectedShape.name + "_copy",
            };

            shapes.push(newShape);
            rebuildWorld();

            // Automatically select the new copy
            selectShape(newShape.id);
        }
    </script>
</body>
